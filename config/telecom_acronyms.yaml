# Common 3GPP / O-RAN Telecom Acronyms
# Used by TAAE (Telecom Acronym & Augmentation Engine)
# Format: ACRONYM: "Full expansion"

# Radio Access
PRACH: "Physical Random Access Channel"
PDCCH: "Physical Downlink Control Channel"
PDSCH: "Physical Downlink Shared Channel"
PUSCH: "Physical Uplink Shared Channel"
PUCCH: "Physical Uplink Control Channel"
PHICH: "Physical Hybrid ARQ Indicator Channel"
PBCH: "Physical Broadcast Channel"
PCFICH: "Physical Control Format Indicator Channel"
PSS: "Primary Synchronization Signal"
SSS: "Secondary Synchronization Signal"
CSI-RS: "Channel State Information Reference Signal"
DMRS: "Demodulation Reference Signal"
SRS: "Sounding Reference Signal"
PRS: "Positioning Reference Signal"
CRS: "Cell-specific Reference Signal"

# Channel Quality
CQI: "Channel Quality Indicator"
PMI: "Precoding Matrix Indicator"
RI: "Rank Indicator"
LI: "Layer Indicator"
SINR: "Signal to Interference plus Noise Ratio"
RSRP: "Reference Signal Received Power"
RSRQ: "Reference Signal Received Quality"
RSSI: "Received Signal Strength Indicator"
BLER: "Block Error Rate"

# MAC / RLC / PDCP
HARQ: "Hybrid Automatic Repeat Request"
ARQ: "Automatic Repeat Request"
RLC: "Radio Link Control"
MAC: "Medium Access Control"
PDCP: "Packet Data Convergence Protocol"
SDAP: "Service Data Adaptation Protocol"
RRC: "Radio Resource Control"
PRB: "Physical Resource Block"
TTI: "Transmission Time Interval"
MCS: "Modulation and Coding Scheme"
BSR: "Buffer Status Report"
PHR: "Power Headroom Report"
SR: "Scheduling Request"

# Handover / Mobility
HO: "Handover"
A3: "A3 event (neighbour becomes offset better than serving)"
A5: "A5 event (serving becomes worse than threshold 1 and neighbour becomes better than threshold 2)"
MRO: "Mobility Robustness Optimization"
MLB: "Mobility Load Balancing"
HOF: "Handover Failure"
RLF: "Radio Link Failure"
CHO: "Conditional Handover"
DAPS: "Dual Active Protocol Stack"
TA: "Timing Advance"
SON: "Self-Organizing Network"

# RAN Architecture
gNB: "Next Generation NodeB"
CU: "Central Unit"
DU: "Distributed Unit"
RU: "Radio Unit"
CU-CP: "Central Unit Control Plane"
CU-UP: "Central Unit User Plane"
F1: "F1 interface (CU-DU)"
E1: "E1 interface (CU-CP to CU-UP)"
Xn: "Xn interface (gNB-gNB)"
NG: "NG interface (gNB-AMF/UPF)"
X2: "X2 interface (LTE-NR)"

# Core / Protocol
AMF: "Access and Mobility Management Function"
SMF: "Session Management Function"
UPF: "User Plane Function"
UDM: "Unified Data Management"
PCF: "Policy Control Function"
NSSF: "Network Slice Selection Function"
AUSF: "Authentication Server Function"
NRF: "Network Repository Function"
NEF: "Network Exposure Function"

# O-RAN Specific
RIC: "RAN Intelligent Controller"
xApp: "External Application (Near-RT RIC)"
rApp: "RAN Application (Non-RT RIC)"
E2: "E2 interface (gNB-Near-RT RIC)"
A1: "A1 interface (Non-RT RIC to Near-RT RIC)"
O1: "O1 interface (SMO to managed elements)"
SMO: "Service Management and Orchestration"
OAM: "Operations Administration and Maintenance"

# KPI Terms
KPI: "Key Performance Indicator"
MTTR: "Mean Time To Repair"
MTTF: "Mean Time To Failure"
QoS: "Quality of Service"
QoE: "Quality of Experience"
GBR: "Guaranteed Bit Rate"
AMBR: "Aggregate Maximum Bit Rate"
UL: "Uplink"
DL: "Downlink"
UE: "User Equipment"
NR: "New Radio"
LTE: "Long Term Evolution"
5G: "Fifth Generation"
mmWave: "millimeter Wave"
Sub-6GHz: "Sub-6 Gigahertz frequency band"

# Procedures
RACH: "Random Access Channel"
RLF: "Radio Link Failure"
RRC_IDLE: "RRC Idle State"
RRC_CONNECTED: "RRC Connected State"
RRC_INACTIVE: "RRC Inactive State"
NACK: "Negative Acknowledgement"
ACK: "Acknowledgement"
RSNA: "RRC Signaling with NAS"
NAS: "Non-Access Stratum"
AS: "Access Stratum"
