# ============================================================
#  FCRAG 2.0 — Master Configuration
# ============================================================

project:
  name: "FCRAG 2.0"
  team: "IIT Madras AgentX-10"
  version: "2.0.0"

# ── Paths (relative to project root) ───────────────────────
paths:
  data_dir: "data"
  models_dir: "models"
  results_dir: "results"
  feedback_log: "data/feedback/feedback_log.jsonl"

# ── Models ─────────────────────────────────────────────────
models:
  embedding:
    name: "AliMaatouk/Gemma-2-2B-Tele"
    local_path: "models/gemma-2-2b-tele"
    embedding_dim: 2048
    hidden_layer_index: -2        # layer -2 hidden states
    batch_size: 16
    device: "cuda"                # "cpu" on Mac
    dtype: "float16"              # use float32 on CPU

  llm_primary:
    name: "AliMaatouk/Llama-3.2-3B-Tele-it"
    local_path: "models/llama-3.2-3b-tele-it"
    quantization: "4bit"          # requires bitsandbytes + CUDA
    max_new_tokens: 512
    temperature: 0.1
    device: "cuda"
    use_vllm: false               # set true on Linux with CUDA

  llm_fallback:
    name: "AliMaatouk/TinyLlama-1.1B-Tele-it"
    local_path: "models/tinyllama-1.1b-tele-it"
    quantization: "4bit"
    max_new_tokens: 256
    temperature: 0.1
    device: "cuda"

  reranker:
    name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    local_path: "models/ms-marco-minilm-l6-v2"
    device: "cpu"                 # ONNX on CPU
    use_onnx: true

# ── Chunking ───────────────────────────────────────────────
chunking:
  chunk_size_tokens: 125
  overlap_tokens: 25
  min_chunk_size: 30
  ocr_enabled: true              # PaddleOCR for images
  preserve_metadata: true

# ── Qdrant ─────────────────────────────────────────────────
qdrant:
  host: "localhost"
  port: 6333
  in_memory: true                # true for demo; false for persistent
  collections:
    3gpp_specs:
      name: "3gpp_specs"
      vector_size: 2048
      distance: "Cosine"
    oran_specs:
      name: "oran_specs"
      vector_size: 2048
      distance: "Cosine"
    simu5g_narratives:
      name: "simu5g_narratives"
      vector_size: 2048
      distance: "Cosine"
    alarm_history:
      name: "alarm_history"
      vector_size: 2048
      distance: "Cosine"

# ── Retrieval ──────────────────────────────────────────────
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  rerank_top_k: 5
  rrf_k_constant: 60             # RRF fusion parameter
  min_score_threshold: 0.3

# ── Anomaly Detection ──────────────────────────────────────
anomaly_detection:
  isolation_forest:
    n_estimators: 100
    contamination: 0.05
    random_state: 42
  ewma:
    alpha: 0.1                   # smoothing factor
    drift_sigma_threshold: 2.0   # stddev threshold for drift alert
  kpi_window_seconds: 60
  severity_thresholds:
    critical: 0.9
    high: 0.7
    medium: 0.5
    low: 0.0

# ── FSE (Fault Signature Encoder) ─────────────────────────
fse:
  input_dim: 15                  # number of KPI features
  hidden_dim_1: 64
  hidden_dim_2: 128
  output_dim: 2048               # must match embedding_dim
  dropout: 0.1
  learning_rate: 0.001
  epochs: 100
  early_stopping_patience: 10
  contrastive_temperature: 0.07
  checkpoint_path: "models/fse_checkpoint.pt"
  version_file: "models/fse_version.txt"

# ── TAAE (Acronym & Augmentation) ─────────────────────────
taae:
  acronym_dict_path: "config/telecom_acronyms.yaml"
  augmentation_synonyms: 3      # number of synonym terms to append

# ── LangGraph Pipeline ─────────────────────────────────────
agents:
  llm_timeout_seconds: 2.5      # fallback trigger threshold
  max_sub_queries: 4
  faithfulness_thresholds:
    high: 0.85
    medium: 0.60
    insufficient: 0.0
  validator:
    claim_coverage_method: "overlap"  # "overlap" | "nli"
    min_claim_length_words: 5

# ── API ────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  log_level: "info"

# ── Evaluation ─────────────────────────────────────────────
evaluation:
  teleqna_tasks:
    - "Standards Overview"
    - "Standards Specifications"
  latency_benchmark_runs: 50
  random_seed: 42
  targets:
    mrr: 0.75
    recall_at_5: 0.85
    faithfulness: 0.90
    e2e_latency_seconds: 4.0

# ── Demo ───────────────────────────────────────────────────
demo:
  n_replay_scenarios: 5
  kpi_update_interval_ms: 500   # Streamlit chart update interval
  streamlit_port: 8501

# ── Feedback ───────────────────────────────────────────────
feedback:
  retrain_threshold: 100        # trigger FSE retrain after N confirmed pairs
  log_all_queries: true
